<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MHW Skills OCR 翻譯</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", sans-serif; margin: 16px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 14px; margin-bottom: 12px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    button { padding: 10px 14px; border-radius: 10px; border: 1px solid #999; background: #fff; cursor: pointer; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    input[type="file"] { padding: 6px; }
    .muted { color: #666; font-size: 13px; line-height: 1.4; }
    .status { white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 12px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid #eee; padding: 10px 8px; text-align: left; vertical-align: top; }
    th { background: #fafafa; }
    .pill { display: inline-block; padding: 2px 8px; border: 1px solid #ddd; border-radius: 999px; font-size: 12px; color: #444; }
    img { max-width: 100%; height: auto; border-radius: 10px; border: 1px solid #eee; }
    .two { display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 900px){ .two{ grid-template-columns: 1fr 1fr; } }
  </style>

  <!-- SheetJS: 讀 Excel -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <!-- Tesseract.js: 瀏覽器 OCR -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>

<body>
  <h2>技能截圖自動翻譯（英/日 → 繁中）</h2>

  <div class="card">
    <div class="row">
      <button id="btnLoadDict">重新載入翻譯.xlsx</button>
      <span class="pill" id="dictState">尚未載入對照表</span>
    </div>
    <div class="muted">
      需求：同資料夾放 <b>翻譯.xlsx</b>（欄位：英文 / 中文 / 日文）。<br>
      GitHub Pages 可以直接跑，不用後端。OCR 在你的瀏覽器本機執行。
    </div>
  </div>

  <div class="card two">
    <div>
      <h3>1) 上傳截圖</h3>
      <input id="imgInput" type="file" accept="image/*" />
      <div class="muted">建議：用原始解析度截圖、不要壓縮；文字越清楚 OCR 越準。</div>
      <div style="margin-top:10px;">
        <img id="preview" alt="preview" />
      </div>
    </div>

    <div>
      <h3>2) 執行 OCR + 翻譯</h3>
      <div class="row">
        <button id="btnRun" disabled>開始辨識</button>
        <label class="muted">
          OCR 語言：
          <select id="langSel">
            <option value="eng+jpn" selected>英文 + 日文</option>
            <option value="eng">只英文</option>
            <option value="jpn">只日文</option>
          </select>
        </label>
      </div>
      <div class="muted">
        等級解析：抓右側的 <b>Lv 1~7</b> 格式（你的截圖就是這個格式）。<br>
        若某列找不到翻譯，會顯示「（未找到對照）」並保留原文。
      </div>
      <div class="card" style="margin-top:10px;">
        <div class="status" id="status">狀態：等待上傳圖片與載入對照表</div>
      </div>
    </div>
  </div>

  <div class="card">
    <h3>結果</h3>
    <div class="row" style="margin-bottom:8px;">
      <button id="btnCopy" disabled>複製結果文字</button>
      <button id="btnDownload" disabled>下載結果(JSON)</button>
    </div>
    <div id="result"></div>
  </div>

<script>
  // ====== 設定 ======
  const DICT_XLSX = "翻譯.xlsx"; // 放在同目錄
  const COL_EN = "英文";
  const COL_ZH = "中文";
  const COL_JA = "日文";

  // ====== 狀態 ======
  let dictLoaded = false;
  let EN2ZH = new Map(); // key: lower-case english
  let JA2ZH = new Map(); // key: japanese exact
  let lastResult = [];

  const $ = (id) => document.getElementById(id);

  function setStatus(msg){
    $("status").textContent = msg;
  }
  function setDictState(ok){
    dictLoaded = ok;
    $("dictState").textContent = ok ? "已載入對照表" : "尚未載入對照表";
    $("dictState").style.borderColor = ok ? "#9ad39a" : "#ddd";
    $("btnRun").disabled = !(ok && $("imgInput").files.length);
  }

  // ====== 讀取 Excel 對照表 ======
  async function loadDictFromXlsx(){
    setStatus("狀態：下載並讀取翻譯.xlsx ...");
    EN2ZH.clear(); JA2ZH.clear();

    const resp = await fetch(DICT_XLSX, { cache: "no-store" });
    if(!resp.ok){
      setDictState(false);
      setStatus("錯誤：找不到 翻譯.xlsx。請確認 index.html 與 翻譯.xlsx 在同一資料夾，且 GitHub Pages 有部署成功。");
      return;
    }
    const buf = await resp.arrayBuffer();
    const wb = XLSX.read(buf, { type: "array" });
    const sheetName = wb.SheetNames[0];
    const ws = wb.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });

    // 期待欄位：英文 / 中文 / 日文
    let okCount = 0;
    for(const r of rows){
      const en = String(r[COL_EN] ?? "").trim();
      const zh = String(r[COL_ZH] ?? "").trim();
      const ja = String(r[COL_JA] ?? "").trim();
      if(zh){
        if(en) EN2ZH.set(en.toLowerCase(), zh);
        if(ja) JA2ZH.set(ja, zh);
        okCount++;
      }
    }

    if(okCount === 0){
      setDictState(false);
      setStatus(`錯誤：讀到了 Excel，但沒抓到有效資料。請確認欄位名稱是否為「${COL_EN}/${COL_ZH}/${COL_JA}」。`);
      return;
    }

    setDictState(true);
    setStatus(`狀態：對照表載入完成（${okCount} 筆）`);
  }

  // ====== OCR + 解析 ======
  function toCanvas(img){
    const canvas = document.createElement("canvas");
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0);
    return canvas;
  }

  // 把 OCR 的 word/line 依 y 座標聚類（同一行）
  function groupLines(words){
    // words: [{text, x0,y0,x1,y1}]
    const sorted = [...words].sort((a,b)=> (a.y0-b.y0) || (a.x0-b.x0));
    const lines = [];
    const yTol = 14; // 行高容忍（可調）

    for(const w of sorted){
      let placed = false;
      for(const ln of lines){
        if(Math.abs(w.y0 - ln.y) <= yTol){
          ln.items.push(w);
          ln.y = (ln.y + w.y0) / 2;
          placed = true;
          break;
        }
      }
      if(!placed){
        lines.push({ y: w.y0, items: [w] });
      }
    }
    // 每行按 x 排序，組成文字
    for(const ln of lines){
      ln.items.sort((a,b)=>a.x0-b.x0);
      ln.text = ln.items.map(i=>i.text).join(" ").replace(/\s+/g," ").trim();
      ln.minX = Math.min(...ln.items.map(i=>i.x0));
      ln.maxX = Math.max(...ln.items.map(i=>i.x1));
    }
    return lines;
  }

  function extractLv(text){
    // 抓 "Lv 5" / "Lv5" / "LV 3" 等
    const m = text.match(/\bL(?:v|V)\s*([0-9]{1,2})\b/);
    return m ? m[1] : "";
  }

  function cleanSkillName(text){
    // 去掉 Lv、數字等，留下技能名（OCR 可能把 Lv 放一起）
    return text
      .replace(/\bL(?:v|V)\s*[0-9]{1,2}\b/g, "")
      .replace(/[|]/g, "")
      .replace(/\s+/g, " ")
      .trim();
  }

  function translateSkill(name){
    if(!name) return { zh: "", hit: false };

    // 1) 直接日文 key
    if(JA2ZH.has(name)) return { zh: JA2ZH.get(name), hit: true };

    // 2) 英文 lower key
    const low = name.toLowerCase();
    if(EN2ZH.has(low)) return { zh: EN2ZH.get(low), hit: true };

    // 3) 嘗試 fuzzy：避免 OCR 少一個字母（英文最常）
    //    簡單做法：挑最相近的英文 key（只在長度>4時嘗試）
    if(low.length >= 5){
      let best = null, bestScore = 0;
      for(const k of EN2ZH.keys()){
        // 粗略相似度：共同前綴 + 長度差
        const prefix = commonPrefixLen(low, k);
        const score = prefix / Math.max(low.length, k.length) - Math.abs(low.length - k.length)*0.02;
        if(score > bestScore){
          bestScore = score;
          best = k;
        }
      }
      if(best && bestScore > 0.45){
        return { zh: EN2ZH.get(best), hit: true, fuzzy: best };
      }
    }

    return { zh: "（未找到對照）", hit: false };
  }

  function commonPrefixLen(a,b){
    const n = Math.min(a.length,b.length);
    let i=0;
    for(; i<n; i++){
      if(a[i] !== b[i]) break;
    }
    return i;
  }

  async function runOcrAndTranslate(){
    const img = $("preview");
    const lang = $("langSel").value;

    if(!img.src){ setStatus("錯誤：尚未選擇圖片"); return; }
    if(!dictLoaded){ setStatus("錯誤：尚未載入對照表"); return; }

    setStatus("狀態：OCR 辨識中（第一次可能較久）...");
    $("btnRun").disabled = true;

    const canvas = toCanvas(img);
    const { data } = await Tesseract.recognize(canvas, lang, {
      logger: (m) => {
        if(m.status) setStatus(`狀態：${m.status} ${Math.round((m.progress||0)*100)}%`);
      }
    });

    // 抓出 words，含 bbox，方便分行
    const words = (data.words || [])
      .map(w => ({
        text: (w.text || "").trim(),
        x0: w.bbox?.x0 ?? 0,
        y0: w.bbox?.y0 ?? 0,
        x1: w.bbox?.x1 ?? 0,
        y1: w.bbox?.y1 ?? 0,
      }))
      .filter(w => w.text.length > 0);

    if(words.length === 0){
      setStatus("完成：但 OCR 沒讀到任何文字。請換更清晰截圖或改語言。");
      $("btnRun").disabled = false;
      return;
    }

    // 分行
    const lines = groupLines(words);

    // 只保留看起來像技能清單的行：通常會包含 Lv 或者很像技能名
    // 這裡用「有 Lv」的優先；沒有 Lv 的行忽略（避免把上方標題抓進來）
    const skillLines = lines
      .map(ln => {
        const lv = extractLv(ln.text);
        return { ...ln, lv };
      })
      .filter(ln => ln.lv); // 只收有 Lv 的行（符合你截圖格式）

    // 每行：技能名 = 去掉 Lv 後的文字
    const parsed = skillLines.map(ln => {
      const raw = cleanSkillName(ln.text);
      // 有些 OCR 會把 "Lv" 讀成 "Lⅴ" 或怪字，這裡再補救：右側通常是 Lv，raw 可能包含多餘字，先保留原文
      const t = translateSkill(raw);
      return {
        raw: raw,
        lv: ln.lv,
        zh: t.zh,
        hit: t.hit,
        fuzzy: t.fuzzy || ""
      };
    });

    // 去掉重複（OCR 可能讀兩次）
    const uniq = [];
    const seen = new Set();
    for(const r of parsed){
      const key = `${r.raw}__${r.lv}`;
      if(!seen.has(key)){
        seen.add(key);
        uniq.push(r);
      }
    }

    lastResult = uniq;
    renderResult(uniq);

    $("btnCopy").disabled = uniq.length === 0;
    $("btnDownload").disabled = uniq.length === 0;

    setStatus(`完成：辨識到 ${uniq.length} 行技能`);
    $("btnRun").disabled = false;
  }

  function renderResult(rows){
    if(!rows.length){
      $("result").innerHTML = "<div class='muted'>目前沒有結果</div>";
      return;
    }
    const html = `
      <table>
        <thead>
          <tr>
            <th style="width:34%;">繁中</th>
            <th style="width:10%;">等級</th>
            <th style="width:36%;">原文(英/日 OCR)</th>
            <th style="width:20%;">備註</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => `
            <tr>
              <td><b>${escapeHtml(r.zh)}</b></td>
              <td>Lv ${escapeHtml(r.lv)}</td>
              <td>${escapeHtml(r.raw)}</td>
              <td class="muted">
                ${r.hit ? "OK" : "未對到"}
                ${r.fuzzy ? `<br>fuzzy→ ${escapeHtml(r.fuzzy)}` : ""}
              </td>
            </tr>
          `).join("")}
        </tbody>
      </table>
      <div class="muted" style="margin-top:10px;">
        提醒：若出現「未對到」，通常是 OCR 誤讀（少字/多字）。你可以換更清晰的截圖、或把 OCR 語言改成只英文/只日文試試。
      </div>
    `;
    $("result").innerHTML = html;
  }

  function escapeHtml(s){
    return String(s ?? "").replace(/[&<>"']/g, (c)=>({
      "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
    }[c]));
  }

  // ====== UI wiring ======
  $("btnLoadDict").addEventListener("click", loadDictFromXlsx);

  $("imgInput").addEventListener("change", () => {
    const f = $("imgInput").files[0];
    if(!f) return;
    const url = URL.createObjectURL(f);
    $("preview").src = url;
    $("btnRun").disabled = !(dictLoaded);
    setStatus("狀態：圖片已載入，等待執行辨識");
  });

  $("btnRun").addEventListener("click", runOcrAndTranslate);

  $("btnCopy").addEventListener("click", async () => {
    const text = lastResult.map(r => `${r.zh}\tLv ${r.lv}\t(${r.raw})`).join("\n");
    await navigator.clipboard.writeText(text);
    setStatus("已複製到剪貼簿");
  });

  $("btnDownload").addEventListener("click", () => {
    const blob = new Blob([JSON.stringify(lastResult, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "skill_result.json";
    a.click();
    URL.revokeObjectURL(a.href);
  });

  // ====== 初始自動載入 ======
  loadDictFromXlsx();
</script>
</body>
</html>
