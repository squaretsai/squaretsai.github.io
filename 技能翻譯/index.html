<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MHW Skills OCR（只翻技能名）</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", sans-serif; margin: 16px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 14px; margin-bottom: 12px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    button { padding: 10px 14px; border-radius: 10px; border: 1px solid #999; background: #fff; cursor: pointer; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    input[type="file"] { padding: 6px; }
    .muted { color: #666; font-size: 13px; line-height: 1.4; }
    .status { white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 12px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid #eee; padding: 10px 8px; text-align: left; vertical-align: top; }
    th { background: #fafafa; }
    .pill { display: inline-block; padding: 2px 8px; border: 1px solid #ddd; border-radius: 999px; font-size: 12px; color: #444; }
    img { max-width: 100%; height: auto; border-radius: 10px; border: 1px solid #eee; }
    .two { display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 900px){ .two{ grid-template-columns: 1fr 1fr; } }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
  </style>

  <!-- SheetJS: 讀 Excel -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <!-- Tesseract.js -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>

<body>
  <h2>技能截圖自動翻譯（不判 Lv，只翻技能名）</h2>

  <div class="card">
    <div class="row">
      <button id="btnLoadDict">重新載入翻譯.xlsx</button>
      <span class="pill" id="dictState">尚未載入對照表</span>
    </div>
    <div class="muted">
      同資料夾放 <b>翻譯.xlsx</b>（欄位：英文 / 中文 / 日文）。<br>
      GitHub Pages 可直接跑（無後端）。OCR 在你瀏覽器本機執行。
    </div>
  </div>

  <div class="card two">
    <div>
      <h3>1) 上傳截圖</h3>
      <input id="imgInput" type="file" accept="image/*" />
      <div class="muted">建議：原始解析度截圖、不要壓縮；越清楚越準。</div>
      <div style="margin-top:10px;">
        <img id="preview" alt="preview" />
      </div>
    </div>

    <div>
      <h3>2) OCR + 翻譯</h3>
      <div class="row">
        <button id="btnRun" disabled>開始辨識</button>
        <label class="muted">
          OCR 語言：
          <select id="langSel">
            <option value="eng" selected>只英文（建議）</option>
            <option value="eng+jpn">英文 + 日文</option>
            <option value="jpn">只日文</option>
          </select>
        </label>
        <label class="muted">
          影像預處理：
          <select id="preSel">
            <option value="on" selected>開（建議）</option>
            <option value="off">關</option>
          </select>
        </label>
      </div>

      <div class="muted">
        這版不看 Lv，因此你這種「只有格子沒有 Lv 文字」的截圖也能做。<br>
        只會顯示「成功對到對照表」的技能；沒對到的會直接隱藏。
      </div>

      <div class="card" style="margin-top:10px;">
        <div class="status" id="status">狀態：等待上傳圖片與載入對照表</div>
      </div>
    </div>
  </div>

  <div class="card">
    <h3>結果</h3>
    <div class="row" style="margin-bottom:8px;">
      <button id="btnCopy" disabled>複製結果文字</button>
      <button id="btnDownload" disabled>下載結果(JSON)</button>
    </div>
    <div id="result"></div>
    <div class="muted" style="margin-top:10px;">
      <div class="mono" id="debug"></div>
    </div>
  </div>

<script>
  // ====== 設定 ======
  const DICT_XLSX = "翻譯.xlsx";
  const COL_EN = "英文";
  const COL_ZH = "中文";
  const COL_JA = "日文";

  // ====== 狀態 ======
  let dictLoaded = false;

  // 英文(小寫) -> 中文
  let EN2ZH = new Map();

  // 日文(原樣) -> 中文
  let JA2ZH = new Map();

  // 中文 -> 英文(原樣)（用來顯示「對照表中的英文原文」）
  // 若同一中文對應多個英文，先保留第一個
  let ZH2EN = new Map();

  // 英文 keys array (for fuzzy)
  let EN_KEYS = [];

  // 讓 fuzzy 命中時也能拿到「原始英文」顯示
  // 英文(小寫) -> 英文(原樣)
  let ENLOW2ENRAW = new Map();

  let lastResult = [];

  const $ = (id) => document.getElementById(id);

  function setStatus(msg){ $("status").textContent = msg; }
  function setDictState(ok){
    dictLoaded = ok;
    $("dictState").textContent = ok ? "已載入對照表" : "尚未載入對照表";
    $("dictState").style.borderColor = ok ? "#9ad39a" : "#ddd";
    $("btnRun").disabled = !(ok && $("imgInput").files.length);
  }

  // ====== 讀取 Excel 對照表 ======
  async function loadDictFromXlsx(){
    setStatus("狀態：下載並讀取翻譯.xlsx ...");
    EN2ZH.clear(); JA2ZH.clear(); ZH2EN.clear(); EN_KEYS = []; ENLOW2ENRAW.clear();

    const resp = await fetch(DICT_XLSX, { cache: "no-store" });
    if(!resp.ok){
      setDictState(false);
      setStatus("錯誤：找不到 翻譯.xlsx。請確認 index.html 與 翻譯.xlsx 在同一資料夾，且 GitHub Pages 有部署成功。");
      return;
    }

    const buf = await resp.arrayBuffer();
    const wb = XLSX.read(buf, { type: "array" });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });

    let okCount = 0;
    for(const r of rows){
      const enRaw = String(r[COL_EN] ?? "").trim();
      const zh = String(r[COL_ZH] ?? "").trim();
      const ja = String(r[COL_JA] ?? "").trim();
      if(!zh) continue;

      if(enRaw){
        const enLow = enRaw.toLowerCase();
        EN2ZH.set(enLow, zh);
        EN_KEYS.push(enLow);
        ENLOW2ENRAW.set(enLow, enRaw);

        // 讓顯示用「中文旁邊的英文」從對照表拿（優先 exact 英文）
        if(!ZH2EN.has(zh)) ZH2EN.set(zh, enRaw);
      }

      if(ja){
        JA2ZH.set(ja, zh);
        // 若中文還沒有英文，至少讓它可以顯示（如果只有日文那列）
        if(!ZH2EN.has(zh) && enRaw) ZH2EN.set(zh, enRaw);
      }

      okCount++;
    }

    if(okCount === 0){
      setDictState(false);
      setStatus(`錯誤：讀到了 Excel，但沒抓到有效資料。請確認欄位名稱是否為「${COL_EN}/${COL_ZH}/${COL_JA}」。`);
      return;
    }

    setDictState(true);
    setStatus(`狀態：對照表載入完成（${okCount} 筆）`);
  }

  // ====== 影像預處理（降低小格子/背景干擾） ======
  function preprocessToCanvas(img){
    const canvas = document.createElement("canvas");
    const w = img.naturalWidth, h = img.naturalHeight;
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0);

    const im = ctx.getImageData(0,0,w,h);
    const d = im.data;
    for(let i=0;i<d.length;i+=4){
      const r=d[i], g=d[i+1], b=d[i+2];
      let gray = (r*0.299 + g*0.587 + b*0.114);
      gray = (gray - 128) * 1.4 + 128;
      const v = gray > 155 ? 255 : 0;
      d[i]=d[i+1]=d[i+2]=v;
      d[i+3]=255;
    }
    ctx.putImageData(im,0,0);
    return canvas;
  }

  // ====== 文字清洗 / 過濾 ======
  function normalizeLine(s){
    return s
      .replace(/[®©™]/g, "")
      .replace(/^[\s\(\)\[\]\{\}\+\-]*\d+\)?\s*/g, "")
      .replace(/[|]/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function isLikelySkillLine(s){
    if(!s) return false;
    if(s.length < 5) return false;

    const low = s.toLowerCase();
    if(low.includes("active skills")) return false;
    if(low.includes("equipment skills")) return false;

    if(!/[a-z]/i.test(s)) return false;

    const letters = (s.match(/[a-z]/gi) || []).length;
    if(letters < 4) return false;

    return true;
  }

  // ====== 模糊比對（Levenshtein） ======
  function levenshtein(a, b){
    a = a.toLowerCase(); b = b.toLowerCase();
    const m=a.length, n=b.length;
    const dp = new Array(n+1);
    for(let j=0;j<=n;j++) dp[j]=j;
    for(let i=1;i<=m;i++){
      let prev = dp[0];
      dp[0]=i;
      for(let j=1;j<=n;j++){
        const tmp = dp[j];
        const cost = (a[i-1]===b[j-1]) ? 0 : 1;
        dp[j] = Math.min(
          dp[j] + 1,
          dp[j-1] + 1,
          prev + cost
        );
        prev = tmp;
      }
    }
    return dp[n];
  }

  function bestEnglishMatch(raw){
    const low = raw.toLowerCase();
    if(EN2ZH.has(low)){
      const zh = EN2ZH.get(low);
      const enRaw = ENLOW2ENRAW.get(low) || raw;
      return { enLow: low, enRaw, zh, score: 1.0, fuzzy: "" };
    }

    if(!EN_KEYS.length) return null;

    let bestKey = null;
    let bestScore = -1;

    for(const k of EN_KEYS){
      const dist = levenshtein(low, k);
      const maxLen = Math.max(low.length, k.length);
      const score = 1 - dist / maxLen;
      if(score > bestScore){
        bestScore = score;
        bestKey = k;
      }
    }

    // 門檻：0.72（可調）
    if(bestKey && bestScore >= 0.72){
      const zh = EN2ZH.get(bestKey);
      const enRaw = ENLOW2ENRAW.get(bestKey) || bestKey;
      return { enLow: bestKey, enRaw, zh, score: bestScore, fuzzy: bestKey };
    }
    return null;
  }

  // 這裡改成：只回傳「命中對照表」的結果；沒命中就回 null
  function translateLine(raw){
    // 日文精確命中
    if(JA2ZH.has(raw)){
      const zh = JA2ZH.get(raw);
      const enFromDict = ZH2EN.get(zh) || "";
      return { hit: true, zh, en: enFromDict, note: "JA exact" };
    }

    // 英文 exact / fuzzy
    const m = bestEnglishMatch(raw);
    if(m){
      // 需求：顯示「對照表中的英文原文」
      // → 用 m.enRaw（就是 Excel 那格英文），而不是 OCR raw
      return {
        hit: true,
        zh: m.zh,
        en: m.enRaw,
        note: m.fuzzy ? `fuzzy (${Math.round(m.score*100)}%)` : "EN exact"
      };
    }

    return null; // 未辨識/未命中 -> 不顯示
  }

  // ====== OCR 主流程 ======
  async function runOcrAndTranslate(){
    const img = $("preview");
    const lang = $("langSel").value;
    const pre = $("preSel").value;

    if(!img.src){ setStatus("錯誤：尚未選擇圖片"); return; }
    if(!dictLoaded){ setStatus("錯誤：尚未載入對照表"); return; }

    setStatus("狀態：OCR 辨識中（第一次可能較久）...");
    $("btnRun").disabled = true;
    $("debug").textContent = "";

    const source = (pre === "on") ? preprocessToCanvas(img) : img;

    const { data } = await Tesseract.recognize(source, lang, {
      logger: (m) => {
        if(m.status) setStatus(`狀態：${m.status} ${Math.round((m.progress||0)*100)}%`);
      }
    });

    const rawText = (data.text || "").replace(/\r/g,"");
    const rawLines = rawText.split("\n").map(s=>s.trim()).filter(Boolean);

    const cleaned = rawLines.map(normalizeLine).filter(isLikelySkillLine);

    // 去重（以 OCR 行去重）
    const uniq = [];
    const seen = new Set();
    for(const s of cleaned){
      const key = s.toLowerCase();
      if(seen.has(key)) continue;
      seen.add(key);
      uniq.push(s);
    }

    // 翻譯（只保留命中的）
    const out = [];
    for(const s of uniq){
      const t = translateLine(s);
      if(!t) continue; // 需求 1：未辨識/未命中 -> 不顯示
      out.push({
        zh: t.zh,
        en: t.en || "",   // 需求 2：顯示對照表英文
        note: t.note || ""
      });
    }

    // 以（中文+英文）再去重（避免不同 OCR 行都對到同一技能）
    const final = [];
    const seen2 = new Set();
    for(const r of out){
      const k = `${r.zh}__${r.en}`.toLowerCase();
      if(seen2.has(k)) continue;
      seen2.add(k);
      final.push(r);
    }

    lastResult = final;
    renderResult(final);

    $("btnCopy").disabled = final.length === 0;
    $("btnDownload").disabled = final.length === 0;

    setStatus(`完成：OCR 抓到 ${rawLines.length} 行，候選 ${uniq.length} 行，命中 ${final.length} 項`);
    $("debug").textContent =
      `【OCR 原始行數】${rawLines.length}\n` +
      `【過濾後候選】${uniq.length}\n` +
      `【命中對照表】${final.length}\n` +
      `（未命中者已依你的需求隱藏）`;

    $("btnRun").disabled = false;
  }

  function escapeHtml(s){
    return String(s ?? "").replace(/[&<>"']/g, (c)=>({
      "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
    }[c]));
  }

  function renderResult(rows){
    if(!rows.length){
      $("result").innerHTML = "<div class='muted'>沒有命中任何技能（可能 OCR 沒讀到技能字樣，或過濾太嚴格 / 門檻太高）</div>";
      return;
    }

    // 需求：顯示「中文 + 對照表英文原文」
    $("result").innerHTML = `
      <table>
        <thead>
          <tr>
            <th style="width:50%;">繁中</th>
            <th style="width:50%;">英文（對照表）</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => `
            <tr>
              <td><b>${escapeHtml(r.zh)}</b></td>
              <td>${escapeHtml(r.en)}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;
  }

  // ====== UI ======
  $("btnLoadDict").addEventListener("click", loadDictFromXlsx);

  $("imgInput").addEventListener("change", () => {
    const f = $("imgInput").files[0];
    if(!f) return;
    $("preview").src = URL.createObjectURL(f);
    $("btnRun").disabled = !dictLoaded;
    setStatus("狀態：圖片已載入，等待執行辨識");
  });

  $("btnRun").addEventListener("click", runOcrAndTranslate);

  $("btnCopy").addEventListener("click", async () => {
    // 只輸出：中文 + 英文（對照表）
    const text = lastResult.map(r => `${r.zh}\t${r.en}`).join("\n");
    await navigator.clipboard.writeText(text);
    setStatus("已複製到剪貼簿");
  });

  $("btnDownload").addEventListener("click", () => {
    const blob = new Blob([JSON.stringify(lastResult, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "skill_result.json";
    a.click();
    URL.revokeObjectURL(a.href);
  });

  // 自動載入
  loadDictFromXlsx();
</script>
</body>
</html>
