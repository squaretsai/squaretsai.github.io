<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MHW Skills OCR 翻譯（穩定版/不判別Lv）</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", sans-serif; margin: 16px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 14px; margin-bottom: 12px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    button { padding: 10px 14px; border-radius: 10px; border: 1px solid #999; background: #fff; cursor: pointer; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    input[type="file"] { padding: 6px; }
    .muted { color: #666; font-size: 13px; line-height: 1.4; }
    .status { white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 12px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid #eee; padding: 10px 8px; text-align: left; vertical-align: top; }
    th { background: #fafafa; }
    .pill { display: inline-block; padding: 2px 8px; border: 1px solid #ddd; border-radius: 999px; font-size: 12px; color: #444; }
    img { max-width: 100%; height: auto; border-radius: 10px; border: 1px solid #eee; }
    .two { display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 900px){ .two{ grid-template-columns: 1fr 1fr; } }
    details { margin-top: 10px; }
    textarea { width: 100%; min-height: 160px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 12px; }
  </style>

  <!-- SheetJS: 讀 Excel -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <!-- Tesseract.js: 瀏覽器 OCR -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>

<body>
  <h2>技能截圖自動翻譯（英/日 → 繁中，不判別Lv｜穩定版）</h2>

  <div class="card">
    <div class="row">
      <button id="btnLoadDict">重新載入 翻譯.xlsx</button>
      <span class="pill" id="dictState">尚未載入對照表</span>
    </div>
    <div class="muted">
      需求：<b>index.html</b> 與 <b>翻譯.xlsx</b> 放在同一層（同資料夾/同路徑）。<br>
      這版不靠 bbox 分行，直接用 OCR 的整段文字切行，避免「辨識 0」。
    </div>
  </div>

  <div class="card two">
    <div>
      <h3>1) 上傳截圖</h3>
      <input id="imgInput" type="file" accept="image/*" />
      <div class="muted">建議：用原始解析度截圖、不要壓縮。</div>
      <div style="margin-top:10px;">
        <img id="preview" alt="preview" />
      </div>
    </div>

    <div>
      <h3>2) 執行 OCR + 翻譯</h3>
      <div class="row">
        <button id="btnRun" disabled>開始辨識</button>
        <label class="muted">
          OCR 語言：
          <select id="langSel">
            <option value="eng+jpn" selected>英文 + 日文</option>
            <option value="eng">只英文</option>
            <option value="jpn">只日文</option>
          </select>
        </label>
      </div>

      <div class="muted">
        這版 <b>不解析Lv</b>，只抓技能名稱並翻譯。<br>
        若結果仍很少，請看下方「原始 OCR 文字」，通常一眼就知道 OCR 讀到什麼。
      </div>

      <div class="card" style="margin-top:10px;">
        <div class="status" id="status">狀態：等待上傳圖片與載入對照表</div>
      </div>
    </div>
  </div>

  <div class="card">
    <h3>結果</h3>
    <div class="row" style="margin-bottom:8px;">
      <button id="btnCopy" disabled>複製結果文字</button>
      <button id="btnDownload" disabled>下載結果(JSON)</button>
    </div>
    <div id="result"></div>

    <details>
      <summary class="muted">顯示原始 OCR 文字（除錯用）</summary>
      <textarea id="ocrRaw" readonly placeholder="這裡會顯示 OCR 原文..."></textarea>
    </details>
  </div>

<script>
  // ====== 設定 ======
  const DICT_XLSX = "翻譯.xlsx";
  const COL_EN = "英文";
  const COL_ZH = "中文";
  const COL_JA = "日文";

  // ====== 狀態 ======
  let dictLoaded = false;
  const EN2ZH = new Map(); // lower-case english -> zh
  const JA2ZH = new Map(); // japanese exact -> zh
  let lastResult = [];

  const $ = (id) => document.getElementById(id);

  function setStatus(msg){ $("status").textContent = msg; }
  function setDictState(ok){
    dictLoaded = ok;
    $("dictState").textContent = ok ? "已載入對照表" : "尚未載入對照表";
    $("dictState").style.borderColor = ok ? "#9ad39a" : "#ddd";
    $("btnRun").disabled = !(ok && $("imgInput").files.length);
  }

  // ====== 讀取 Excel ======
  async function loadDictFromXlsx(){
    setStatus("狀態：下載並讀取 翻譯.xlsx ...");
    EN2ZH.clear(); JA2ZH.clear();

    const resp = await fetch(DICT_XLSX, { cache: "no-store" });
    if(!resp.ok){
      setDictState(false);
      setStatus("錯誤：找不到 翻譯.xlsx。請確認它跟 index.html 同一層，且 GitHub Pages 已部署到正確分支/資料夾。");
      return;
    }

    const buf = await resp.arrayBuffer();
    const wb = XLSX.read(buf, { type: "array" });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });

    let okCount = 0;
    for(const r of rows){
      const en = String(r[COL_EN] ?? "").trim();
      const zh = String(r[COL_ZH] ?? "").trim();
      const ja = String(r[COL_JA] ?? "").trim();
      if(!zh) continue;
      if(en) EN2ZH.set(en.toLowerCase(), zh);
      if(ja) JA2ZH.set(ja, zh);
      okCount++;
    }

    if(okCount === 0){
      setDictState(false);
      setStatus(`錯誤：Excel 讀得到，但資料筆數是 0。請確認欄位名要完全等於「${COL_EN}/${COL_ZH}/${COL_JA}」。`);
      return;
    }

    setDictState(true);
    setStatus(`狀態：對照表載入完成（${okCount} 筆）`);
  }

  // ====== 翻譯（不判別Lv） ======
  function commonPrefixLen(a,b){
    const n = Math.min(a.length,b.length);
    let i=0; for(; i<n; i++){ if(a[i] !== b[i]) break; }
    return i;
  }

  function cleanLine(s){
    // 盡量把雜訊剃掉（但不過度）
    return String(s || "")
      .replace(/\r/g, "")
      .replace(/[|]/g, "")
      .replace(/L\s*(?:v|V)\s*\d{1,2}/g, "") // 如果同一行帶 Lv 也剃掉
      .replace(/\s+/g, " ")
      .trim();
  }

  function translateSkill(name){
    if(!name) return { zh: "", hit: false };

    if(JA2ZH.has(name)) return { zh: JA2ZH.get(name), hit: true };

    const low = name.toLowerCase();
    if(EN2ZH.has(low)) return { zh: EN2ZH.get(low), hit: true };

    // 簡易 fuzzy：共同前綴 + 長度差（門檻低一點，避免一律未對到）
    if(low.length >= 5 && EN2ZH.size){
      let best = null, bestScore = -1;
      for(const k of EN2ZH.keys()){
        const prefix = commonPrefixLen(low, k);
        const score = prefix / Math.max(low.length, k.length) - Math.abs(low.length - k.length)*0.02;
        if(score > bestScore){ bestScore = score; best = k; }
      }
      if(best && bestScore > 0.30){
        return { zh: EN2ZH.get(best), hit: true, fuzzy: best };
      }
    }

    return { zh: "（未找到對照）", hit: false };
  }

  function escapeHtml(s){
    return String(s ?? "").replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
    }[c]));
  }

  function renderResult(rows){
    if(!rows.length){
      $("result").innerHTML = "<div class='muted'>目前沒有結果</div>";
      return;
    }

    $("result").innerHTML = `
      <table>
        <thead>
          <tr>
            <th style="width:42%;">繁中</th>
            <th style="width:38%;">原文(英/日 OCR)</th>
            <th style="width:20%;">備註</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => `
            <tr>
              <td><b>${escapeHtml(r.zh)}</b></td>
              <td>${escapeHtml(r.raw)}</td>
              <td class="muted">
                ${r.hit ? "OK" : "未對到"}
                ${r.fuzzy ? `<br>fuzzy→ ${escapeHtml(r.fuzzy)}` : ""}
              </td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;
  }

  // ====== OCR 主流程（用 data.text 切行，避免 0） ======
  async function runOcrAndTranslate(){
    const img = $("preview");
    const lang = $("langSel").value;

    if(!img.src){ setStatus("錯誤：尚未選擇圖片"); return; }
    if(!dictLoaded){ setStatus("錯誤：尚未載入對照表"); return; }

    setStatus("狀態：OCR 辨識中（第一次可能較久）...");
    $("btnRun").disabled = true;
    $("ocrRaw").value = "";

    const canvas = document.createElement("canvas");
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    canvas.getContext("2d").drawImage(img, 0, 0);

    const { data } = await Tesseract.recognize(canvas, lang, {
      logger: (m) => {
        if(m.status) setStatus(`狀態：${m.status} ${Math.round((m.progress||0)*100)}%`);
      }
    });

    const rawText = (data && data.text) ? data.text : "";
    $("ocrRaw").value = rawText || "(OCR 沒輸出 text)";

    // 若 OCR text 都是空，直接告訴你：問題在 OCR 不是解析
    if(!rawText || rawText.trim().length === 0){
      setStatus("完成：OCR text 為空（通常是語言檔載入失敗、或圖片太糊/太小）。請先看『原始 OCR 文字』是否為空。");
      $("btnRun").disabled = false;
      renderResult([]);
      return;
    }

    // 逐行處理
    const lines = rawText.split("\n")
      .map(cleanLine)
      .filter(s => s.length >= 3);

    // 過濾標題/雜訊
    const filtered = lines.filter(s => {
      const low = s.toLowerCase();
      if(low.includes("active skills")) return false;
      if(low.includes("equipment skills")) return false;
      if(low === "lv") return false;
      if(/^\d+$/.test(low)) return false;
      return true;
    });

    // 去重（忽略大小寫）
    const uniq = [];
    const seen = new Set();
    for(const s of filtered){
      const k = s.toLowerCase();
      if(!seen.has(k)){
        seen.add(k);
        uniq.push(s);
      }
    }

    const result = uniq.map(raw => {
      const t = translateSkill(raw);
      return { raw, zh: t.zh, hit: t.hit, fuzzy: t.fuzzy || "" };
    });

    lastResult = result;
    renderResult(result);

    $("btnCopy").disabled = result.length === 0;
    $("btnDownload").disabled = result.length === 0;

    setStatus(`完成：辨識到 ${result.length} 個技能（不解析Lv）。`);
    $("btnRun").disabled = false;
  }

  // ====== UI ======
  $("btnLoadDict").addEventListener("click", loadDictFromXlsx);

  $("imgInput").addEventListener("change", () => {
    const f = $("imgInput").files[0];
    if(!f) return;
    $("preview").src = URL.createObjectURL(f);
    $("btnRun").disabled = !dictLoaded;
    setStatus("狀態：圖片已載入，等待執行辨識");
  });

  $("btnRun").addEventListener("click", runOcrAndTranslate);

  $("btnCopy").addEventListener("click", async () => {
    const text = lastResult.map(r => `${r.zh}\t(${r.raw})`).join("\n");
    await navigator.clipboard.writeText(text);
    setStatus("已複製到剪貼簿");
  });

  $("btnDownload").addEventListener("click", () => {
    const blob = new Blob([JSON.stringify(lastResult, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "skill_result.json";
    a.click();
    URL.revokeObjectURL(a.href);
  });

  loadDictFromXlsx();
</script>
</body>
</html>
